services:
  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gordian-frontend
    ports:
      - "3000:3000"
    # volumes:
    #   # Монтируем исходники для hot-reload
    #   - ./frontend:/app
    #   # Исключаем node_modules — используем контейнерные
    #   - /app/node_modules
    #   # Исключаем dist
    #   - /app/dist
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=500
      - WATCHPACK_POLLING=true
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - gordian-network
  # ==================== BACKEND ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gordian-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - hf_cache:/root/.cache/huggingface  # Кэш моделей
    restart: unless-stopped
    depends_on:
      - qdrant
      - neo4j
    networks:
      - gordian-network

  # ==================== QDRANT v1.18.2 ====================
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: gordian-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - gordian-network

  # ==================== NEO4J 5.26 ====================
  neo4j:
    image: neo4j:5.26-community
    container_name: gordian-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/gordian_hackathon_2025
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=512M
      - NEO4J_dbms_memory_pagecache_size=256M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    restart: unless-stopped
    networks:
      - gordian-network

# ==================== VOLUMES ====================
volumes:
  qdrant_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_plugins:
    driver: local
  hf_cache:

# ==================== NETWORKS ====================
networks:
  gordian-network:
    driver: bridge