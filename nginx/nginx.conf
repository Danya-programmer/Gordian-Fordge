# Перенаправление HTTP → HTTPS
server {
    listen 80;
    server_name gordian-forge.ru www.gordian-forge.ru;

    # Для Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Основной HTTPS сервер
server {
    listen 443 ssl;
    http2 on;
    server_name gordian-forge.ru www.gordian-forge.ru;

    # SSL сертификаты (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/gordian-forge.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gordian-forge.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Безопасность
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Размер тела запроса (для загрузки файлов)
    client_max_body_size 100M;

    # ==================== FRONTEND (статика) ====================
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== BACKEND REST API ====================
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Таймауты для долгих запросов (парсинг документов)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ==================== SOCKET.IO (WebSocket) ====================
    location /socket.io/ {
        proxy_pass http://backend:8000/socket.io/;
        proxy_http_version 1.1;
        
        # КРИТИЧНО для WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Длинные таймауты для WebSocket (24 часа)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # # ==================== UPLOAD (опционально, если нужно) ====================
    # location /upload {
    #     proxy_pass http://backend:8000/upload;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
        
    #     client_max_body_size 200M;
    #     proxy_read_timeout 300s;
    # }

    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}